<style>
:root{--bg:#FDF8F5;--fg:#3D2C2E;--muted:#9A8585;--accent:#C9A96E;--card:#FFFFFF;--border:#F0DDD3;--rose:#D4A0A0}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'Lato',sans-serif;background:var(--bg);color:var(--fg);overflow-x:hidden;min-height:100vh}
h1,h2,h3,h4{font-family:'Playfair Display',serif}
.page-enter{animation:fadeIn .4s ease-out}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-18px)}}
@keyframes pulse-gold{0%,100%{box-shadow:0 0 0 0 rgba(201,169,110,.4)}70%{box-shadow:0 0 0 14px rgba(201,169,110,0)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
.float-a{animation:float 6s ease-in-out infinite}
.float-b{animation:float 8s ease-in-out 2s infinite}
.wa-pulse{animation:pulse-gold 2s infinite}
.skeleton{background:linear-gradient(90deg,#f0e0e0 25%,#f9f0e8 50%,#f0e0e0 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:8px}
.tog{position:relative;width:46px;height:25px;cursor:pointer;display:inline-block}
.tog input{opacity:0;width:0;height:0;position:absolute}
.tog-s{position:absolute;inset:0;background:#d1d5db;border-radius:25px;transition:.3s}
.tog-s::before{content:'';position:absolute;width:19px;height:19px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.3s;box-shadow:0 1px 3px rgba(0,0,0,.15)}
.tog input:checked+.tog-s{background:var(--accent)}
.tog input:checked+.tog-s::before{transform:translateX(21px)}
.cart-sb{transform:translateX(100%);transition:transform .35s cubic-bezier(.4,0,.2,1)}
.cart-sb.open{transform:translateX(0)}
.cart-ov{opacity:0;pointer-events:none;transition:opacity .35s}
.cart-ov.open{opacity:1;pointer-events:auto}
.p-card:hover .p-img{transform:scale(1.05)}
.p-img{transition:transform .5s ease}
.bdg{font-size:.6rem;padding:2px 7px;border-radius:9999px;font-weight:700;letter-spacing:.03em;text-transform:uppercase}
.btn-p{background:var(--accent);color:#fff;border:none;padding:12px 28px;border-radius:8px;font-weight:700;cursor:pointer;transition:all .2s;font-size:.95rem;display:inline-flex;align-items:center;justify-content:center;gap:8px}
.btn-p:hover{background:#B8944F;transform:translateY(-1px);box-shadow:0 4px 16px rgba(201,169,110,.3)}
.btn-p:active{transform:translateY(0)}
.btn-o{background:transparent;color:var(--accent);border:2px solid var(--accent);padding:10px 26px;border-radius:8px;font-weight:700;cursor:pointer;transition:all .2s;font-size:.95rem;display:inline-flex;align-items:center;justify-content:center;gap:8px;text-decoration:none}
.btn-o:hover{background:var(--accent);color:#fff}
.btn-wa{background:#25D366;color:#fff;border:none;padding:12px 28px;border-radius:8px;font-weight:700;cursor:pointer;transition:all .2s;font-size:.95rem;display:inline-flex;align-items:center;justify-content:center;gap:8px;text-decoration:none}
.btn-wa:hover{background:#1da851;transform:translateY(-1px)}
input[type="text"],input[type="number"],input[type="email"],input[type="password"],textarea,select{width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:8px;font-family:'Lato',sans-serif;font-size:.95rem;background:#fff;transition:border-color .2s;color:var(--fg)}
input:focus,textarea:focus,select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(201,169,110,.15)}
.toast-i{animation:slideR .3s ease-out,fadeOR .3s ease-in 2.7s forwards}
@keyframes slideR{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes fadeOR{to{transform:translateX(100%);opacity:0}}
.cpill{white-space:nowrap;padding:8px 18px;border-radius:9999px;font-size:.8rem;font-weight:600;cursor:pointer;transition:all .2s;border:1.5px solid var(--border);background:#fff;color:var(--muted)}
.cpill:hover,.cpill.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.cpill:hover:not(.on){background:var(--accent);color:#fff;border-color:var(--accent);transform:scale(1.05);}
.hero-bg{background:linear-gradient(160deg,#FDF8F5 0%,#FAF0EB 40%,#F0DDD3 100%)}
.dc{position:absolute;border-radius:50%;filter:blur(60px);pointer-events:none}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
@media(max-width:640px){.cart-sb{width:100%!important}}
.line-clamp-2{display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
</style>
</head>
<body>
<div id="app">
  <header id="hd" class="fixed top-0 left-0 right-0 z-40 bg-white/90 backdrop-blur-md border-b border-rose-200/50 transition-shadow duration-300"></header>
  <main id="mc" class="pt-16 pb-20 md:pb-8 min-h-screen"></main>
  <div id="cov" class="cart-ov fixed inset-0 bg-black/40 z-50" onclick="A.tCart(false)"></div>
  <aside id="csb" class="cart-sb fixed top-0 right-0 h-full w-full sm:w-[400px] bg-white z-50 shadow-2xl flex flex-col"></aside>
  <a id="waf" href="https://wa.me/5518997871211?text=Ol%C3%A1%2C%20Vivi!%20Gostaria%20de%20saber%20mais%20sobre%20os%20produtos." target="_blank" rel="noopener" class="fixed bottom-24 md:bottom-8 right-4 z-30 w-14 h-14 bg-[#25D366] rounded-full flex items-center justify-center text-white text-2xl shadow-lg wa-pulse hover:scale-110 transition-transform" aria-label="Falar no WhatsApp"><i class="fa-brands fa-whatsapp"></i></a>
  <div id="tc" class="fixed top-20 right-4 z-[60] flex flex-col gap-2"></div>
  <nav id="mn" class="fixed bottom-0 left-0 right-0 z-40 bg-white/95 backdrop-blur-md border-t border-rose-200/50 md:hidden"></nav>
  <footer id="ft" class="hidden md:block bg-warm-800 text-white/80"></footer>
</div>

<script>
const VIVI_LOGO = 'https://ifqbuhrhmefqiwrpzvsh.supabase.co/storage/v1/object/public/site-assets/Vivi%20Boty.jpg';
const SUPABASE_URL = 'https://ifqbuhrhmefqiwrpzvsh.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlmcWJ1aHJobWVmcWl3cnB6dnNoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzMzE4MDEsImV4cCI6MjA5NzkwNzgwMX0._Yu2nE4AKgNfEM6x7c3uaMPBjj01KMGJ9cxRVqdWw7w';


const WA = '5518997871211';
const WAB = 'https://wa.me/' + WA;
const CATS = ['Perfumes','Maquiagem','Cremes','Corpo e Banho','Presentes','Outros'];
const BRANDS = ['O Boticário','Natura','Eudora','Outros'];
const GENEROS = ['','Feminino','Masculino','Unissex'];
const CK = 'viviboty_cart';

const A = {
  sb: null, user: null, isAdmin: false, isPlaceholder: false,
  prods: [], pmap: {}, cart: [], route: '',
  filt: { q:'', cat:'', brand:'', promo:false, genero:'' },

  chkPlaceholder() {
    this.isPlaceholder = !SUPABASE_URL || !SUPABASE_ANON_KEY ||
      SUPABASE_URL.includes('SEU-PROJETO') || SUPABASE_ANON_KEY.includes('SUA-ANON-KEY');
  },

  async init() {
    this.loadCart();
    this.chkPlaceholder();
    if (!this.isPlaceholder && window.supabase) {
      try {
        this.sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        const { data: sd } = await this.sb.auth.getSession();
        if (sd && sd.session && sd.session.user) {
          this.user = sd.session.user;
          this.isAdmin = await this.chkAdmin();
        }
        this.sb.auth.onAuthStateChange((ev, s) => {
          this.user = s && s.user ? s.user : null;
          if (!this.user) this.isAdmin = false;
        });
      } catch (e) { console.warn('Erro ao conectar Supabase:', e); this.sb = null; }
    }
    this.rHd(); this.rMn(); this.rFt(); this.rCS();
    document.getElementById('mc').addEventListener('click', e => this.pClick(e));
    window.addEventListener('hashchange', () => this.go(location.hash));
    this.go(location.hash || '#/');
  },

  go(h) { this.route = h || '#/'; this.rPage(); window.scrollTo({top:0,behavior:'smooth'}); },

  async rPage() {
    const m = document.getElementById('mc');
    m.innerHTML = '<div class="flex justify-center py-20"><div class="skeleton w-64 h-8"></div></div>';
    if (this.route === '#/' || this.route === '#/home') return await this.rHome();
    if (this.route === '#/produtos') return await this.rProds();
    if (this.route.startsWith('#/produto/')) return await this.rDetail(this.route.split('#/produto/')[1]);
    if (this.route === '#/admin') return this.rLogin();
    if (this.route === '#/admin/produtos') return await this.rAProds();
    if (this.route === '#/admin/novo') return this.rAForm();
    if (this.route.startsWith('#/admin/editar/')) return await this.rAForm(this.route.split('#/admin/editar/')[1]);
    return await this.rHome();
  },

  msgPlaceholder() {
    return '<div class="page-enter max-w-lg mx-auto px-4 py-20 text-center"><div class="bg-white rounded-2xl border border-rose-100 p-8"><div class="w-16 h-16 mx-auto mb-4 rounded-full bg-rose-50 flex items-center justify-center text-rose-300"><i class="fa-solid fa-gear text-2xl"></i></div><h2 class="font-display font-bold text-xl text-warm-800 mb-2">Ainda n\u00e3o configurado</h2><p class="text-sm text-warm-800/50 leading-relaxed">As credenciais do Supabase ainda precisam ser preenchidas no c\u00f3digo do site.</p></div></div>';
  },

  msgErro(titulo, desc) {
    return '<div class="page-enter max-w-lg mx-auto px-4 py-20 text-center"><div class="bg-white rounded-2xl border border-rose-100 p-8"><div class="w-16 h-16 mx-auto mb-4 rounded-full bg-red-50 flex items-center justify-center text-red-300"><i class="fa-solid fa-circle-exclamation text-2xl"></i></div><h2 class="font-display font-bold text-xl text-warm-800 mb-2">'+titulo+'</h2><p class="text-sm text-warm-800/50 leading-relaxed">'+desc+'</p><button onclick="location.reload()" class="btn-p mt-5 text-sm">Tentar novamente</button></div></div>';
  },

  async fetchProds() {
    if (!this.sb) return false;
    try {
      const {data, error} = await this.sb.from('products').select('*').order('data_criacao',{ascending:false});
      if (error) throw error;
      this.prods = (data||[]).map(p => ({...p, preco: parseFloat(p.preco)||0, genero: p.genero||''}));
      this.pmap = {}; this.prods.forEach(p => this.pmap[p.id] = p);
      return true;
    } catch (e) { console.error('Erro ao carregar produtos:', e); this.prods = []; this.pmap = {}; return false; }
  },

  async ensureProds() { if (this.prods.length > 0) return true; return await this.fetchProds(); },

  filtered() {
    return this.prods.filter(p => {
      if (!p.ativo) return false;
      if (this.filt.q && !p.nome.toLowerCase().includes(this.filt.q.toLowerCase())) return false;
      if (this.filt.cat && p.categoria !== this.filt.cat) return false;
      if (this.filt.brand && p.marca !== this.filt.brand) return false;
      if (this.filt.promo && !p.promocao) return false;
      if (this.filt.genero && p.genero !== this.filt.genero) return false;
      return true;
    });
  },

  async chkAdmin() {
    if (!this.user || !this.sb) return false;
    try { const {data} = await this.sb.from('admin_users').select('id').eq('email', this.user.email).single(); return !!data; }
    catch { return false; }
  },

  pClick(e) {
    const wb = e.target.closest('[data-wa]');
    if (wb) { e.stopPropagation(); const p = this.pmap[wb.dataset.wa]; if(p) this.pWA(p); return; }
    const cb = e.target.closest('[data-add]');
    if (cb) { e.stopPropagation(); const p = this.pmap[cb.dataset.add]; if(p) this.addCart(p); return; }
    const cd = e.target.closest('[data-pid]');
    if (cd && !wb && !cb) location.hash = '#/produto/' + cd.dataset.pid;
  },

  logo(cls) {
    return '<img src="'+VIVI_LOGO+'" alt="Vivi Boty" class="'+cls+' rounded-full object-cover" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\'"><div class="'+cls+' rounded-full bg-gradient-to-br from-rose-300 to-gold-400 items-center justify-center text-white font-display font-bold text-sm" style="display:none">VB</div>';
  },

  rHd() {
    document.getElementById('hd').innerHTML = '<div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between"><a href="#/" class="flex items-center gap-2.5 no-underline">'+this.logo('w-9 h-9')+'<span class="font-display font-bold text-lg text-warm-800 hidden sm:block">Vivi Boty</span></a><nav class="hidden md:flex items-center gap-6 text-sm font-semibold text-warm-800/70"><a href="#/" class="hover:text-gold-500 transition-colors">In\u00edcio</a><a href="#/produtos" class="hover:text-gold-500 transition-colors">Produtos</a><button onclick="A.tCart(true)" class="relative hover:text-gold-500 transition-colors" aria-label="Sacola"><i class="fa-solid fa-bag-shopping text-lg"></i><span id="bh" class="absolute -top-2 -right-2.5 min-w-[20px] h-5 bg-gold-400 text-white text-[10px] font-bold rounded-full flex items-center justify-center px-1 hidden">0</span></button><a href="#/admin" class="hover:text-gold-500 transition-colors" aria-label="Admin"><i class="fa-solid fa-user-shield"></i></a></nav><div class="flex md:hidden items-center gap-4"><button onclick="A.tCart(true)" class="relative text-warm-800" aria-label="Sacola"><i class="fa-solid fa-bag-shopping text-lg"></i><span id="bm" class="absolute -top-2 -right-2.5 min-w-[20px] h-5 bg-gold-400 text-white text-[10px] font-bold rounded-full flex items-center justify-center px-1 hidden">0</span></button></div></div>';
  },

  rMn() {
    document.getElementById('mn').innerHTML = '<div class="flex justify-around items-center h-16 text-warm-800/60"><a href="#/" class="flex flex-col items-center gap-0.5 text-[10px] font-semibold hover:text-gold-500 transition-colors"><i class="fa-solid fa-home text-lg"></i>In\u00edcio</a><a href="#/produtos" class="flex flex-col items-center gap-0.5 text-[10px] font-semibold hover:text-gold-500 transition-colors"><i class="fa-solid fa-store text-lg"></i>Produtos</a><button onclick="A.tCart(true)" class="flex flex-col items-center gap-0.5 text-[10px] font-semibold hover:text-gold-500 transition-colors"><i class="fa-solid fa-bag-shopping text-lg"></i>Sacola</button><a href="#/admin" class="flex flex-col items-center gap-0.5 text-[10px] font-semibold hover:text-gold-500 transition-colors"><i class="fa-solid fa-user-shield text-lg"></i>Admin</a></div>';
  },

  rFt() {
    document.getElementById('ft').innerHTML = '<div class="max-w-7xl mx-auto px-6 py-12"><div class="grid grid-cols-1 md:grid-cols-3 gap-10"><div><div class="flex items-center gap-2.5 mb-4">'+this.logo('w-10 h-10')+'<span class="font-display font-bold text-xl text-white">Vivi Boty</span></div><p class="text-white/50 text-sm leading-relaxed">Perfumes, cosm\u00e9ticos e presentes selecionados com atendimento direto pelo WhatsApp.</p></div><div><h4 class="font-display font-bold text-white mb-4">Navega\u00e7\u00e3o</h4><ul class="space-y-2 text-sm"><li><a href="#/" class="text-white/50 hover:text-gold-400 transition-colors">In\u00edcio</a></li><li><a href="#/produtos" class="text-white/50 hover:text-gold-400 transition-colors">Produtos</a></li></ul></div><div><h4 class="font-display font-bold text-white mb-4">Contato</h4><ul class="space-y-2 text-sm"><li><a href="'+WAB+'?text=Ol%C3%A1%2C%20Vivi!" target="_blank" class="text-white/50 hover:text-gold-400 transition-colors"><i class="fa-brands fa-whatsapp mr-2"></i>WhatsApp</a></li><li><a href="https://www.facebook.com/profile.php?id=61591208489955" target="_blank" class="text-white/50 hover:text-gold-400 transition-colors"><i class="fa-brands fa-facebook mr-2"></i>Facebook</a></li></ul></div></div><div class="border-t border-white/10 mt-10 pt-6 text-center text-xs text-white/30">Vivi Boty \u2014 Consultora Independente</div></div>';
  },

  /* ======== CARRINHO ======== */
  rCS() { this.updBdg(); this.renderSB(); },

  renderSB() {
    const s = document.getElementById('csb');
    const tot = this.cart.reduce((a,i)=>a+i.preco*i.q,0);
    const cnt = this.cart.reduce((a,i)=>a+i.q,0);
    let items = '';
    if (this.cart.length === 0) {
      items = '<div class="flex flex-col items-center justify-center h-full text-center text-warm-800/30"><i class="fa-solid fa-bag-shopping text-5xl mb-4"></i><p class="font-semibold">Sua sacola est\u00e1 vazia</p><p class="text-sm mt-1">Adicione produtos para fazer seu or\u00e7amento</p></div>';
    } else {
      this.cart.forEach((it,i) => {
        items += '<div class="flex gap-3 py-3 '+(i>0?'border-t border-rose-100':'')+'"><div class="w-16 h-16 rounded-lg overflow-hidden bg-rose-50 flex-shrink-0">'+(it.img?'<img src="'+it.img+'" alt="'+this.esc(it.nome)+'" class="w-full h-full object-cover" loading="lazy">':'<div class="w-full h-full flex items-center justify-center text-rose-200"><i class="fa-solid fa-image"></i></div>')+'</div><div class="flex-1 min-w-0"><p class="font-semibold text-sm truncate">'+this.esc(it.nome)+'</p><p class="text-gold-500 font-bold text-sm">'+this.fmt(it.preco)+'</p><div class="flex items-center gap-2 mt-1"><button onclick="A.updQ(\''+it.id+'\','+(it.q-1)+')" class="w-7 h-7 rounded-full border border-rose-200 text-xs flex items-center justify-center hover:bg-rose-50 transition-colors '+(it.q<=1?'opacity-30 cursor-default':'')+'" '+(it.q<=1?'disabled':'')+'>-</button><span class="text-sm font-semibold w-6 text-center">'+it.q+'</span><button onclick="A.updQ(\''+it.id+'\','+(it.q+1)+')" class="w-7 h-7 rounded-full border border-rose-200 text-xs flex items-center justify-center hover:bg-rose-50 transition-colors">+</button><button onclick="A.rmCart(\''+it.id+'\')" class="ml-auto text-warm-800/30 hover:text-red-400 text-sm transition-colors"><i class="fa-solid fa-trash-can"></i></button></div></div></div>';
      });
    }
    let footer = '';
    if (this.cart.length > 0) footer = '<div class="border-t border-rose-100 px-5 py-4 space-y-3"><div class="flex justify-between font-bold text-lg"><span>Total estimado</span><span class="text-gold-500">'+this.fmt(tot)+'</span></div><button onclick="A.sendCart()" class="btn-wa w-full"><i class="fa-brands fa-whatsapp text-lg"></i> Enviar or\u00e7amento pelo WhatsApp</button><button onclick="A.clrCart()" class="w-full text-center text-sm text-warm-800/40 hover:text-warm-800/70 transition-colors py-1">Limpar sacola</button></div>';
    s.innerHTML = '<div class="flex items-center justify-between px-5 py-4 border-b border-rose-100"><h3 class="font-display font-bold text-lg">Sua Sacola ('+cnt+')</h3><button onclick="A.tCart(false)" class="text-warm-800/50 hover:text-warm-800 text-xl" aria-label="Fechar"><i class="fa-solid fa-xmark"></i></button></div><div class="flex-1 overflow-y-auto px-5 py-4">'+items+'</div>'+footer;
    this.updBdg();
  },

  tCart(o) { document.getElementById('csb').classList.toggle('open',o); document.getElementById('cov').classList.toggle('open',o); document.body.style.overflow=o?'hidden':''; },
  updBdg() { const c=this.cart.reduce((a,i)=>a+i.q,0); ['bh','bm'].forEach(id=>{const e=document.getElementById(id);if(e){e.textContent=c;e.classList.toggle('hidden',c===0);}}); },
  addCart(p) { const ex=this.cart.find(i=>i.id===p.id); if(ex)ex.q++;else this.cart.push({id:p.id,nome:p.nome,preco:p.preco,img:p.imagem,q:1}); this.saveCart();this.renderSB();this.toast('Produto adicionado \u00e0 sacola','success'); },
  rmCart(id) { this.cart=this.cart.filter(i=>i.id!==id);this.saveCart();this.renderSB(); },
  updQ(id,q) { if(q<1)return;const it=this.cart.find(i=>i.id===id);if(it){it.q=q;this.saveCart();this.renderSB();} },
  clrCart() { this.cart=[];this.saveCart();this.renderSB(); },
  loadCart() { try{this.cart=JSON.parse(localStorage.getItem(CK))||[];}catch{this.cart=[];} },
  saveCart() { localStorage.setItem(CK,JSON.stringify(this.cart)); },

  sendCart() {

  },

  async doLogin() {
    const email=document.getElementById('le').value.trim(), pass=document.getElementById('lp').value, err=document.getElementById('ler');
    if(!email||!pass){err.textContent='Preencha todos os campos.';err.classList.remove('hidden');return;}
    err.classList.add('hidden');
    try {
      const {data,error}=await this.sb.auth.signInWithPassword({email,password:pass});
      if(error) throw error;
      this.user=data.user;
      const admin=await this.chkAdmin();
      if(!admin){await this.sb.auth.signOut();this.user=null;throw new Error('Voc\u00ea n\u00e3o tem permiss\u00e3o de administrador.');}
      this.isAdmin=true;this.toast('Login realizado!','success');location.hash='#/admin/produtos';
    } catch(e) { err.textContent=e.message||'Erro ao fazer login.';err.classList.remove('hidden'); }
  },

        const st=(p.ativo?'<span class="bdg bg-emerald-100 text-emerald-700">Ativo</span>':'<span class="bdg bg-gray-100 text-gray-500">Inativo</span>')+(p.promocao?' <span class="bdg bg-red-100 text-red-600">Promo</span>':'')+(p.pronta_entrega?' <span class="bdg bg-blue-100 text-blue-600">Entrega</span>':'')+(p.destaque?' <span class="bdg bg-amber-100 text-amber-700">Destaque</span>':'')+(p.genero?' <span class="bdg '+(p.genero==='Masculino'?'bg-sky-100 text-sky-700':'bg-pink-100 text-pink-700')+'">'+p.genero+'</span>':'');
        tRows+='<tr class="hover:bg-rose-50/50 transition-colors '+(!p.ativo?'opacity-50':'')+'"><td class="px-4 py-3"><div class="flex items-center gap-3"><div class="w-10 h-10 rounded-lg overflow-hidden bg-rose-50 flex-shrink-0">'+img+'</div><span class="font-semibold text-warm-800 truncate max-w-[180px]">'+this.esc(p.nome)+'</span></div></td><td class="px-4 py-3 text-warm-800/60 text-sm">'+this.esc(p.marca||'-')+'</td><td class="px-4 py-3 text-warm-800/60 text-sm">'+this.esc(p.genero||'-')+'</td><td class="px-4 py-3 text-right font-bold text-gold-500">'+this.fmt(p.preco)+'</td><td class="px-4 py-3 text-center"><div class="flex flex-wrap justify-center gap-1">'+st+'</div></td><td class="px-4 py-3 text-center"><div class="flex justify-center gap-1"><a href="#/admin/editar/'+p.id+'" class="w-8 h-8 rounded-lg bg-rose-50 hover:bg-amber-100 text-warm-800/50 hover:text-amber-600 flex items-center justify-center transition-colors" title="Editar"><i class="fa-solid fa-pen-to-square text-xs"></i></a><button onclick="A.togAtivo(\''+p.id+'\','+!p.ativo+')" class="w-8 h-8 rounded-lg bg-rose-50 hover:bg-emerald-100 text-warm-800/50 hover:text-emerald-600 flex items-center justify-center transition-colors" title="'+(p.ativo?'Desativar':'Ativar')+'"><i class="fa-solid fa-'+(p.ativo?'eye-slash':'eye')+' text-xs"></i></button><button onclick="A.delProd(\''+p.id+'\')" class="w-8 h-8 rounded-lg bg-rose-50 hover:bg-red-100 text-warm-800/50 hover:text-red-500 flex items-center justify-center transition-colors" title="Excluir"><i class="fa-solid fa-trash-can text-xs"></i></button></div></td></tr>';
        mCards+='<div class="p-4 '+( !p.ativo?'opacity-50':'')+'"><div class="flex gap-3"><div class="w-14 h-14 rounded-lg overflow-hidden bg-rose-50 flex-shrink-0">'+img+'</div><div class="flex-1 min-w-0"><p class="font-semibold text-sm truncate">'+this.esc(p.nome)+'</p><p class="text-xs text-warm-800/40">'+this.esc(p.marca||'')+' \u00b7 '+this.esc(p.genero||'-')+'</p><div class="flex flex-wrap gap-1 mt-1">'+st+'</div></div><div class="text-right flex-shrink-0"><p class="font-bold text-gold-500 text-sm">'+this.fmt(p.preco)+'</p></div></div><div class="flex justify-end gap-3 mt-3"><a href="#/admin/editar/'+p.id+'" class="text-xs font-semibold text-gold-500 hover:text-gold-600"><i class="fa-solid fa-pen-to-square mr-1"></i>Editar</a><button onclick="A.togAtivo(\''+p.id+'\','+!p.ativo+')" class="text-xs font-semibold text-warm-800/40 hover:text-warm-800">'+(p.ativo?'Desativar':'Ativar')+'</button><button onclick="A.delProd(\''+p.id+'\')" class="text-xs font-semibold text-warm-800/40 hover:text-red-500">Excluir</button></div></div>';
      });
      rows='<div class="hidden md:block overflow-x-auto"><table class="w-full text-sm"><thead class="bg-rose-50 text-warm-800/50 text-xs uppercase tracking-wider"><tr><th class="px-4 py-3 text-left">Produto</th><th class="px-4 py-3 text-left">Marca</th><th class="px-4 py-3 text-left">G\u00eanero</th><th class="px-4 py-3 text-right">Pre\u00e7o</th><th class="px-4 py-3 text-center">Status</th><th class="px-4 py-3 text-center">A\u00e7\u00f5es</th></tr></thead><tbody class="divide-y divide-rose-50">'+tRows+'</tbody></table></div><div class="md:hidden divide-y divide-rose-50">'+mCards+'</div>';
    }
    document.getElementById('mc').innerHTML = '<div class="page-enter max-w-6xl mx-auto px-4 py-6"><div class="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4 mb-6"><div><h1 class="font-display font-bold text-2xl text-warm-800">Meus Produtos</h1><p class="text-sm text-warm-800/40">'+this.prods.length+' produto'+(this.prods.length!==1?'s':'')+' cadastrado'+(this.prods.length!==1?'s':'')+'</p></div><div class="flex gap-2 flex-wrap"><a href="#/" class="btn-o text-sm py-2 px-4"><i class="fa-solid fa-eye"></i> Ver site</a><a href="#/admin/novo" class="btn-p text-sm py-2 px-4"><i class="fa-solid fa-plus"></i> Novo Produto</a><button onclick="A.doLogout()" class="text-sm text-warm-800/40 hover:text-red-400 py-2 px-3 transition-colors" title="Sair"><i class="fa-solid fa-right-from-bracket"></i></button></div></div><div class="bg-white rounded-2xl border border-rose-100 overflow-hidden">'+rows+'</div></div>';
  },

  /* ======== ADMIN FORM ======== */
  async rAForm(id) {
    if (this.isPlaceholder) { document.getElementById('mc').innerHTML = this.msgPlaceholder(); return; }
    if (!this.user || !this.isAdmin) { this.rLogin(); return; }
    let p={nome:'',marca:'',categoria:'',preco:0,descricao:'',imagem:'',estoque:0,ativo:true,destaque:false,promocao:false,pronta_entrega:false,genero:''};
    if(id){if(!this.prods.length)await this.ensureProds();const f=this.pmap[id];if(f)p=f;}
    const ie=!!id;
    let marOpts='<option value="">Selecione</option>';BRANDS.forEach(b=>{marOpts+='<option value="'+b+'" '+(p.marca===b?'selected':'')+'>'+b+'</option>';});
    let catOpts='<option value="">Selecione</option>';CATS.forEach(c=>{catOpts+='<option value="'+c+'" '+(p.categoria===c?'selected':'')+'>'+c+'</option>';});
    let genOpts='<option value="">Nenhum</option>';GENEROS.forEach(g=>{if(g)genOpts+='<option value="'+g+'" '+(p.genero===g?'selected':'')+'>'+g+'</option>';});

    document.getElementById('mc').innerHTML = '<div class="page-enter max-w-2xl mx-auto px-4 py-6">'
      +'<a href="#/admin/produtos" class="inline-flex items-center gap-2 text-sm text-warm-800/50 hover:text-gold-500 transition-colors mb-6"><i class="fa-solid fa-arrow-left"></i> Voltar aos produtos</a>'
      +'<div class="bg-white rounded-2xl border border-rose-100 shadow-sm p-6 sm:p-8">'
        +'<h1 class="font-display font-bold text-xl text-warm-800 mb-6">'+(ie?'Editar':'Novo')+' Produto</h1>'
        +'<div class="space-y-5">'
          +'<div><label class="block text-sm font-semibold text-warm-800 mb-1">Nome do Produto *</label><input type="text" id="fn" value="'+this.esc(p.nome)+'" placeholder="Ex: Egeo Dolce"></div>'
          +'<div class="grid grid-cols-3 gap-4"><div><label class="block text-sm font-semibold text-warm-800 mb-1">Marca</label><select id="fm">'+marOpts+'</select></div><div><label class="block text-sm font-semibold text-warm-800 mb-1">Categoria</label><select id="fc2">'+catOpts+'</select></div><div><label class="block text-sm font-semibold text-warm-800 mb-1">G\u00eanero</label><select id="fgen">'+genOpts+'</select></div></div>'
          +'<div class="grid grid-cols-2 gap-4"><div><label class="block text-sm font-semibold text-warm-800 mb-1">Pre\u00e7o (R$) *</label><input type="number" id="fpr" value="'+(p.preco||'')+'" step="0.01" min="0" placeholder="0.00"></div><div><label class="block text-sm font-semibold text-warm-800 mb-1">Estoque</label><input type="number" id="fes" value="'+(p.estoque||'')+'" min="0" placeholder="0"></div></div>'
          +'<div><label class="block text-sm font-semibold text-warm-800 mb-1">Descri\u00e7\u00e3o</label><textarea id="fd" rows="3" placeholder="Descri\u00e7\u00e3o do produto...">'+this.esc(p.descricao||'')+'</textarea></div>'
          +'<div><label class="block text-sm font-semibold text-warm-800 mb-1">Imagem do Produto</label><div class="flex items-start gap-4"><div id="fip" class="w-24 h-24 rounded-xl overflow-hidden bg-rose-50 border border-rose-100 flex-shrink-0">'+(p.imagem?'<img src="'+p.imagem+'" alt="" class="w-full h-full object-cover">':'<div class="w-full h-full flex items-center justify-center text-rose-200"><i class="fa-solid fa-image text-2xl"></i></div>')+'</div><div class="flex-1"><input type="file" id="fif" accept="image/*" class="text-sm"><p class="text-xs text-warm-800/30 mt-1">JPG, PNG. M\u00e1ximo 5MB.</p>'+(p.imagem?'<p class="text-xs text-warm-800/30 mt-1">Imagem atual salva. Selecione novo arquivo para trocar.</p>':'')+'</div></div></div>'
          +'<div class="border-t border-rose-100 pt-5 space-y-4"><h3 class="font-semibold text-sm text-warm-800">Op\u00e7\u00f5es de exibi\u00e7\u00e3o</h3><div class="grid grid-cols-2 gap-4">'
            +'<label class="flex items-center justify-between"><span class="text-sm text-warm-800/70">Ativo</span><label class="tog"><input type="checkbox" id="fa" '+(p.ativo?'checked':'')+'><span class="tog-s"></span></label></label>'
            +'<label class="flex items-center justify-between"><span class="text-sm text-warm-800/70">Destaque</span><label class="tog"><input type="checkbox" id="fds" '+(p.destaque?'checked':'')+'><span class="tog-s"></span></label></label>'
            +'<label class="flex items-center justify-between"><span class="text-sm text-warm-800/70">Promo\u00e7\u00e3o</span><label class="tog"><input type="checkbox" id="fpr2" '+(p.promocao?'checked':'')+'><span class="tog-s"></span></label></label>'
            +'<label class="flex items-center justify-between"><span class="text-sm text-warm-800/70">Pronta Entrega</span><label class="tog"><input type="checkbox" id="fpe" '+(p.pronta_entrega?'checked':'')+'><span class="tog-s"></span></label></label>'
          +'</div></div>'
          +'<div id="fe" class="text-red-500 text-sm hidden"></div>'
          +'<button onclick="A.saveProd(\''+(id||'')+'\')" class="btn-p w-full">'+(ie?'Salvar Altera\u00e7\u00f5es':'Cadastrar Produto')+'</button>'
        +'</div>'
      +'</div></div>';

    document.getElementById('fif')?.addEventListener('change',e=>{
      const f=e.target.files[0];
      if(f){const r=new FileReader();r.onload=ev=>{document.getElementById('fip').innerHTML='<img src="'+ev.target.result+'" alt="" class="w-full h-full object-cover">';};r.readAsDataURL(f);}
    });
  },

  async saveProd(id) {
    const err=document.getElementById('fe');
    const nome=document.getElementById('fn').value.trim();
    const preco=parseFloat(document.getElementById('fpr').value)||0;
    if(!nome){err.textContent='O nome do produto \u00e9 obrigat\u00f3rio.';err.classList.remove('hidden');return;}
    if(preco<=0){err.textContent='Informe um pre\u00e7o v\u00e1lido.';err.classList.remove('hidden');return;}
    err.classList.add('hidden');
    const data={
      nome,marca:document.getElementById('fm').value,categoria:document.getElementById('fc2').value,
      genero:document.getElementById('fgen').value,preco,
      descricao:document.getElementById('fd').value.trim(),estoque:parseInt(document.getElementById('fes').value)||0,
      ativo:document.getElementById('fa').checked,destaque:document.getElementById('fds').checked,
      promocao:document.getElementById('fpr2').checked,pronta_entrega:document.getElementById('fpe').checked,
      data_atualizacao:new Date().toISOString()
    };
    const fi=document.getElementById('fif');
    if(fi.files.length>0){
      const file=fi.files[0];
      if(!file.type.startsWith('image/')){err.textContent='Selecione apenas arquivos de imagem.';err.classList.remove('hidden');return;}
      if(file.size>5*1024*1024){err.textContent='A imagem deve ter no m\u00e1ximo 5MB. Este arquivo tem '+(file.size/1024/1024).toFixed(1)+'MB.';err.classList.remove('hidden');return;}
      try{const ext=file.name.split('.').pop();const path=Date.now()+'_'+Math.random().toString(36).slice(2,8)+'.'+ext;const{error:ue}=await this.sb.storage.from('products').upload(path,file);if(ue)throw ue;const{data:ud}=this.sb.storage.from('products').getPublicUrl(path);data.imagem=ud.publicUrl;}
      catch(e){err.textContent='Erro ao enviar imagem: '+(e.message||'');err.classList.remove('hidden');return;}
    }
    try{
      if(id){if(!fi.files.length)delete data.imagem;const{error}=await this.sb.from('products').update(data).eq('id',id);if(error)throw error;this.toast('Produto atualizado!','success');}
      else{data.imagem=data.imagem||'';const{error}=await this.sb.from('products').insert(data);if(error)throw error;this.toast('Produto cadastrado!','success');}
      this.prods=[];this.pmap={};location.hash='#/admin/produtos';
    }catch(e){err.textContent='Erro ao salvar: '+(e.message||'');err.classList.remove('hidden');}
  },

  async togAtivo(id,ativo) { try{const{error}=await this.sb.from('products').update({ativo,data_atualizacao:new Date().toISOString()}).eq('id',id);if(error)throw error;const p=this.pmap[id];if(p)p.ativo=ativo;this.toast(ativo?'Produto ativado':'Produto desativado','success');this.rAProds();}catch(e){this.toast('Erro: '+e.message,'error');} },
  delProd(id) { if(document.querySelector('.dm')){document.querySelector('.dm').remove();return;}const d=document.createElement('div');d.className='dm fixed inset-0 z-50 flex items-center justify-center bg-black/40 p-4';d.innerHTML='<div class="bg-white rounded-2xl p-6 max-w-sm w-full shadow-xl page-enter"><h3 class="font-display font-bold text-lg text-warm-800 mb-2">Excluir produto?</h3><p class="text-sm text-warm-800/50 mb-6">Esta a\u00e7\u00e3o n\u00e3o pode ser desfeita.</p><div class="flex gap-3"><button onclick="this.closest(\'.dm\').remove()" class="btn-o flex-1 text-sm py-2">Cancelar</button><button onclick="A.cfDel(\''+id+'\')" class="flex-1 bg-red-500 text-white rounded-lg font-bold text-sm py-2 hover:bg-red-600 transition-colors cursor-pointer border-none">Excluir</button></div></div>';document.body.appendChild(d); },
  async cfDel(id) { document.querySelector('.dm')?.remove();try{const{error}=await this.sb.from('products').delete().eq('id',id);if(error)throw error;this.prods=this.prods.filter(x=>x.id!==id);delete this.pmap[id];this.toast('Produto exclu\u00eddo','success');this.rAProds();}catch(e){this.toast('Erro: '+e.message,'error');} },
  async doLogout() { if(this.sb)await this.sb.auth.signOut();this.user=null;this.isAdmin=false;this.toast('Voc\u00ea saiu do painel','info');location.hash='#/admin'; },

  fmt(v){return 'R$ '+Number(v).toFixed(2).replace('.',',').replace(/\B(?=(\d{3})+(?!\d))/g,'.');},
  esc(s){if(!s)return '';const d=document.createElement('div');d.textContent=s;return d.innerHTML;},
  toast(msg,type){type=type||'info';const c=document.getElementById('tc');const cl={success:'bg-emerald-500',error:'bg-red-500',info:'bg-warm-800'};const ic={success:'fa-circle-check',error:'fa-circle-xmark',info:'fa-circle-info'};const t=document.createElement('div');t.className='toast-i '+(cl[type]||cl.info)+' text-white px-5 py-3 rounded-xl shadow-lg flex items-center gap-3 text-sm font-semibold max-w-sm';t.innerHTML='<i class="fa-solid '+(ic[type]||ic.info)+'"></i><span>'+msg+'</span>';c.appendChild(t);setTimeout(()=>t.remove(),3100);}
};

document.addEventListener('DOMContentLoaded', () => A.init());
</script>
</body>
</html>
